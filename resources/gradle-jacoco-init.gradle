initscript { }

allprojects {
    apply plugin: 'jacoco'

    jacoco {
        toolVersion = "0.8.11"
    }

    plugins.withType(JavaPlugin) {
        jacocoTestReport {
            dependsOn test
            reports {
                xml.required = true
                html.required = true
            }
        }
        test {
            finalizedBy jacocoTestReport
        }
    }
}
