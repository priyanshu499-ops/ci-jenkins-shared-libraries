<!DOCTYPE html>
<html>
<head>
  <title>Gitleaks Security Report</title>
  <link rel="stylesheet" href="report.css">
</head>

<body>
  <div class="header">
    Gitleaks Security Report
  </div>

  <div class="summary">
    <div class="summary-item">
      <span class="label">Total Findings</span>
      <span class="value">{{TOTAL_FINDINGS}}</span>
    </div>

    <div class="summary-item">
      <span class="label">Generated At</span>
      <span class="value">{{GENERATED_AT}}</span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Rule</th>
        <th>File</th>
        <th>Line</th>
        <th>Author</th>
        <th>Description</th>
        <th>Secret</th>
        <th>Commit</th>
      </tr>
    </thead>
    <tbody>
      {{ROWS}}
    </tbody>
  </table>

  <div class="footer">
    Generated by Gitleaks · Part of the Montra CI/CD Security Pipeline
  </div>
</body>
</html>
